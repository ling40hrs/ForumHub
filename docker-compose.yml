services:
  php:
    image: php:8.2-cli
    container_name: forumhub-php
    working_dir: /app
    volumes:
      - ./api:/app
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t public
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: forumhub
      DB_USER: forumhub
      DB_PASS: forumhub_pass

  mysql:
    image: mysql:8.0
    container_name: forumhub-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: forumhub
      MYSQL_USER: forumhub
      MYSQL_PASSWORD: forumhub_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

volumes:
  mysql_data:
