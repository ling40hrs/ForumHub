name: Weekly Sync

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday 09:00 UTC
  workflow_dispatch:       # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Gather open cross-layer issues
        id: issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'cross-layer',
              state: 'open',
            });
            return issues.data;

      - name: Check CI status
        id: ci
        uses: actions/github-script@v7
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'ci.yml',
              branch: 'main',
              per_page: 1,
            });
            const last = runs.data.workflow_runs[0];
            return last ? { status: last.status, conclusion: last.conclusion } : { status: 'none' };

      - name: Get recent commits
        id: commits
        run: |
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          git log --oneline --no-decorate -10 --since="7 days ago" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create sync summary
        uses: actions/github-script@v7
        with:
          script: |
            const ci = ${{ toJSON(steps.ci.outputs) }};
            const issues = ${{ toJSON(steps.issues.outputs) }};
            const commits = `${{ steps.commits.outputs.commits }}`;

            let body = `## Weekly Sync — ${new Date().toISOString().slice(0, 10)}\n\n`;
            body += `### CI Status\n`;
            body += `Last run: ${ci.conclusion === 'success' ? '✅ Passing' : '❌ Failing'}\n\n`;
            body += `### Open Cross-Layer Issues (${issues.length})\n`;
            for (const i of issues) {
              body += `- [#${i.number}] ${i.title}\n`;
            }
            body += `\n### Recent Commits (7 days)\n\`\`\`\n${commits}\n\`\`\`\n`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Weekly Sync — ${new Date().toISOString().slice(0, 10)}`,
              body: body,
              labels: ['sync'],
            });
